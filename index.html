<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Explorer PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-hover: #185abc;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .drive-card {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .drive-card:hover {
            background-color: #e8f0fe;
            border-color: #d2e3fc;
        }
        .loader {
            border-top-color: var(--google-blue);
            animation: spinner 0.6s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fab {
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #drop-zone.dragover {
            background-color: rgba(26, 115, 232, 0.1);
            border: 2px dashed var(--google-blue);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fab fa-google-drive text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-semibold text-gray-700 hidden sm:block">Drive Explorer</h1>
        </div>

        <div class="flex-1 max-w-2xl mx-8 hidden md:block">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchInput" placeholder="Search in Drive" class="block w-full pl-10 pr-3 py-2 bg-gray-100 border-none rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button id="authBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium text-sm transition-colors flex items-center gap-2">
                <i class="fas fa-user-circle"></i>
                <span id="authBtnText">Sign In</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="drop-zone" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- Toolbar / Breadcrumbs -->
        <div class="px-6 py-4 flex items-center justify-between bg-white border-b shadow-sm">
            <nav class="flex items-center text-sm font-medium overflow-x-auto no-scrollbar" id="breadcrumbs">
                <button onclick="navigateToRoot()" class="text-blue-600 hover:underline whitespace-nowrap">My Drive</button>
            </nav>
            <div class="flex items-center gap-2 ml-4">
                <button onclick="loadFiles()" class="p-2 hover:bg-gray-100 rounded-full text-gray-600" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- File Grid -->
        <div id="fileContainer" class="flex-1 overflow-y-auto p-6">
            <div id="loadingState" class="hidden flex flex-col items-center justify-center h-full">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-gray-500">Accessing Google Drive...</p>
            </div>

            <div id="emptyState" class="hidden flex flex-col items-center justify-center h-full text-gray-400">
                <i class="fas fa-folder-open text-6xl mb-4"></i>
                <p class="text-lg">No files or folders found</p>
                <p class="text-sm">Click the '+' button or Sign In to get started</p>
            </div>

            <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                <!-- Files will be injected here -->
            </div>
        </div>

        <!-- Floating Action Button -->
        <div class="fixed bottom-8 right-8 flex flex-col items-end gap-3">
            <div id="fabMenu" class="hidden flex flex-col gap-2 mb-2 animate-bounce-short">
                <button onclick="triggerFolderCreate()" class="flex items-center gap-2 bg-white text-gray-700 px-4 py-3 rounded-full shadow-lg hover:bg-gray-50 text-sm font-medium border">
                    <i class="fas fa-folder-plus text-yellow-500"></i> New Folder
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-2 bg-white text-gray-700 px-4 py-3 rounded-full shadow-lg hover:bg-gray-50 text-sm font-medium border">
                    <i class="fas fa-file-upload text-blue-500"></i> Upload File
                </button>
            </div>
            <button id="mainFab" class="fab bg-white text-gray-700 w-14 h-14 rounded-2xl flex items-center justify-center text-2xl hover:bg-gray-50 transition-transform active:scale-95 border">
                <i class="fas fa-plus text-blue-600"></i>
            </button>
        </div>
    </main>

    <!-- Hidden Inputs -->
    <input type="file" id="fileInput" class="hidden" multiple>

    <!-- Modal Background -->
    <div id="modalOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- SDKs -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // CONFIGURATION
        const CLIENT_ID = '155197234126-k0por50dvrg1k2p5b3r6722jdhpst06e.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyB51qBN36v8ffCaXHXOW1VI4Kd1UlfjZJQ';
        const ROOT_FOLDER_ID = '1MJ7_PugrHBD3Ej3qug1R6cpQXIIGtd1X';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.metadata.readonly';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let currentFolderId = ROOT_FOLDER_ID;
        let folderStack = [{ id: ROOT_FOLDER_ID, name: 'My Drive' }];
        let accessToken = null;

        // UI Elements
        const authBtn = document.getElementById('authBtn');
        const authBtnText = document.getElementById('authBtnText');
        const grid = document.getElementById('grid');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const mainFab = document.getElementById('mainFab');
        const fabMenu = document.getElementById('fabMenu');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const fileInput = document.getElementById('fileInput');

        // Init Functions
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            try {
                // IMPORTANT: We initialize WITHOUT the API Key here to avoid the project mismatch error.
                // Modern Google API requests can rely solely on the OAuth2 token.
                await gapi.client.init({
                    discoveryDocs: [DISCOVERY_DOC],
                });
                gapiInited = true;
                maybeEnableButtons();
            } catch (err) {
                console.error("GAPI Init Error:", err);
                showError("Failed to initialize Google API client.");
            }
        }

        function gisLoaded() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (resp) => {
                        if (resp.error !== undefined) {
                            console.error("Auth Error:", resp);
                            showError("Authentication failed: " + resp.error);
                            throw (resp);
                        }
                        accessToken = resp.access_token;
                        gapi.client.setToken(resp); 
                        authBtnText.innerText = 'Sign Out';
                        loadFiles();
                    },
                });
                gisInited = true;
                maybeEnableButtons();
            } catch (err) {
                console.error("GIS Init Error:", err);
            }
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                authBtn.style.visibility = 'visible';
            }
        }

        // Auth Logic
        authBtn.onclick = () => {
            if (authBtnText.innerText === 'Sign In') {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                const token = gapi.client.getToken();
                if (token !== null) {
                    google.accounts.oauth2.revoke(token.access_token);
                    gapi.client.setToken('');
                    accessToken = null;
                    authBtnText.innerText = 'Sign In';
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                }
            }
        };

        // Navigation & Listing
        async function loadFiles(folderId = currentFolderId) {
            if (!accessToken) {
                showError("Please Sign In first to access your files.");
                return;
            }

            currentFolderId = folderId;
            updateBreadcrumbs();
            showLoading(true);
            
            try {
                const response = await gapi.client.drive.files.list({
                    q: `'${folderId}' in parents and trashed = false`,
                    fields: 'files(id, name, mimeType, iconLink, webViewLink, thumbnailLink, size)',
                    orderBy: 'folder,name'
                });

                const files = response.result.files;
                renderFiles(files);
            } catch (err) {
                console.error('API Error:', err);
                const errorMsg = err.result?.error?.message || "Check permissions or project credentials.";
                showError(`Failed to load files: ${errorMsg}`);
            } finally {
                showLoading(false);
            }
        }

        function renderFiles(files) {
            grid.innerHTML = '';
            if (!files || files.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            files.forEach(file => {
                const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                const card = document.createElement('div');
                card.className = 'drive-card bg-white p-4 rounded-xl flex flex-col items-center text-center cursor-pointer group relative';
                
                let iconHtml = '';
                if (isFolder) {
                    iconHtml = `<i class="fas fa-folder text-yellow-500 text-5xl mb-3"></i>`;
                } else if (file.thumbnailLink) {
                    iconHtml = `<img src="${file.thumbnailLink}" class="w-12 h-12 object-cover rounded mb-3" onerror="this.src='https://cdn-icons-png.flaticon.com/512/124/124837.png'">`;
                } else {
                    iconHtml = `<i class="fas fa-file-alt text-blue-400 text-5xl mb-3"></i>`;
                }

                card.innerHTML = `
                    ${iconHtml}
                    <span class="text-sm font-medium text-gray-700 truncate w-full px-1" title="${file.name}">${file.name}</span>
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="p-1 hover:bg-gray-200 rounded-full" onclick="showFileOptions(event, '${file.id}', '${file.name}', '${file.webViewLink}')">
                            <i class="fas fa-ellipsis-v text-gray-500 text-xs"></i>
                        </button>
                    </div>
                `;

                card.onclick = (e) => {
                    if (isFolder) {
                        folderStack.push({ id: file.id, name: file.name });
                        loadFiles(file.id);
                    } else {
                        window.open(file.webViewLink, '_blank');
                    }
                };
                grid.appendChild(card);
            });
        }

        function updateBreadcrumbs() {
            breadcrumbs.innerHTML = '';
            folderStack.forEach((folder, index) => {
                const btn = document.createElement('button');
                btn.className = "text-blue-600 hover:underline whitespace-nowrap";
                btn.innerText = folder.name;
                btn.onclick = () => {
                    folderStack = folderStack.slice(0, index + 1);
                    loadFiles(folder.id);
                };
                breadcrumbs.appendChild(btn);

                if (index < folderStack.length - 1) {
                    const sep = document.createElement('span');
                    sep.className = "mx-2 text-gray-400";
                    sep.innerHTML = '<i class="fas fa-chevron-right text-[10px]"></i>';
                    breadcrumbs.appendChild(sep);
                }
            });
        }

        function navigateToRoot() {
            folderStack = [{ id: ROOT_FOLDER_ID, name: 'My Drive' }];
            loadFiles(ROOT_FOLDER_ID);
        }

        // Create & Upload
        async function createFolder(name) {
            if (!name) return;
            if (!accessToken) { showError("Sign In required."); return; }
            try {
                showLoading(true);
                await gapi.client.drive.files.create({
                    resource: {
                        name: name,
                        mimeType: 'application/vnd.google-apps.folder',
                        parents: [currentFolderId]
                    }
                });
                closeModal();
                loadFiles();
            } catch (err) {
                showError("Could not create folder. Check permissions.");
            } finally {
                showLoading(false);
            }
        }

        async function uploadFile(file) {
            if (!accessToken) { showError("Sign In required."); return; }
            try {
                showLoading(true);
                const metadata = {
                    name: file.name,
                    parents: [currentFolderId]
                };

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
                    body: form
                });

                if (response.ok) {
                    loadFiles();
                } else {
                    const error = await response.json();
                    throw new Error(error.error.message);
                }
            } catch (err) {
                showError("File upload failed: " + err.message);
            } finally {
                showLoading(false);
            }
        }

        // File Input Handler
        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => uploadFile(file));
            toggleFab();
        };

        // UI Helpers
        function showLoading(show) {
            loadingState.classList.toggle('hidden', !show);
            if(show) emptyState.classList.add('hidden');
        }

        function toggleFab() {
            fabMenu.classList.toggle('hidden');
            mainFab.querySelector('i').classList.toggle('fa-plus');
            mainFab.querySelector('i').classList.toggle('fa-times');
        }

        mainFab.onclick = (e) => {
            e.stopPropagation();
            toggleFab();
        };

        document.body.onclick = () => {
            if (!fabMenu.classList.contains('hidden')) toggleFab();
        };

        function triggerFolderCreate() {
            openModal(`
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-4">New Folder</h3>
                    <input type="text" id="newFolderName" placeholder="Folder name" class="w-full border rounded-lg p-2 mb-6 outline-none focus:ring-2 focus:ring-blue-500" autofocus>
                    <div class="flex justify-end gap-3">
                        <button onclick="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded">Cancel</button>
                        <button onclick="createFolder(document.getElementById('newFolderName').value)" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Create</button>
                    </div>
                </div>
            `);
        }

        function showFileOptions(e, id, name, link) {
            e.stopPropagation();
            openModal(`
                <div class="p-4">
                    <h3 class="font-bold border-b pb-2 mb-3 truncate">${name}</h3>
                    <div class="flex flex-col gap-1">
                        <button onclick="window.open('${link}', '_blank'); closeModal();" class="text-left px-3 py-2 hover:bg-gray-100 rounded flex items-center gap-3">
                            <i class="fas fa-external-link-alt text-blue-500"></i> Open in Drive
                        </button>
                        <button onclick="copyToClipboard('${link}'); closeModal();" class="text-left px-3 py-2 hover:bg-gray-100 rounded flex items-center gap-3">
                            <i class="fas fa-link text-green-500"></i> Copy Link
                        </button>
                        <button onclick="deleteFile('${id}'); closeModal();" class="text-left px-3 py-2 hover:bg-gray-100 rounded flex items-center gap-3 text-red-600">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `);
        }

        async function deleteFile(fileId) {
            if(!confirm("Are you sure you want to delete this?")) return;
            try {
                showLoading(true);
                await gapi.client.drive.files.delete({ fileId: fileId });
                loadFiles();
            } catch (err) {
                showError("Could not delete file. Check permissions.");
            } finally {
                showLoading(false);
            }
        }

        function openModal(content) {
            modalContent.innerHTML = content;
            modalOverlay.classList.remove('hidden');
        }

        function closeModal() {
            modalOverlay.classList.add('hidden');
            modalContent.innerHTML = '';
        }

        function showError(msg) {
            openModal(`
                <div class="p-6 text-center">
                    <i class="fas fa-exclamation-circle text-red-500 text-4xl mb-4"></i>
                    <p class="text-gray-700 mb-6">${msg}</p>
                    <button onclick="closeModal()" class="bg-gray-800 text-white px-6 py-2 rounded-lg">Dismiss</button>
                </div>
            `);
        }

        function copyToClipboard(text) {
            const input = document.createElement('input');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
        }

        // Drag and Drop
        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                Array.from(e.dataTransfer.files).forEach(file => uploadFile(file));
            }
        };

        // Search
        document.getElementById('searchInput').onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) { loadFiles(); return; }
                if (!accessToken) { showError("Sign In required."); return; }
                
                showLoading(true);
                try {
                    const response = await gapi.client.drive.files.list({
                        q: `name contains '${query}' and trashed = false`,
                        fields: 'files(id, name, mimeType, iconLink, webViewLink, thumbnailLink)'
                    });
                    renderFiles(response.result.files);
                } catch (err) {
                    showError("Search failed.");
                } finally {
                    showLoading(false);
                }
            }
        };

    </script>
</body>
</html>
