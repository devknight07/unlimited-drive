<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="description" content="DriveVault — Secure Google Drive File Manager"/>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;DriveVault&quot;,&quot;short_name&quot;:&quot;DriveVault&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0a0f&quot;,&quot;theme_color&quot;:&quot;%230a0a0f&quot;}"/>
<title>DriveVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --border-lit: #4a4a6a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43d9ad;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --text-muted: #4a4a6a;
    --radius: 12px;
    --font: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(67,217,173,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
    background: rgba(10,10,15,0.85);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 16px;
  }

  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { font-weight: 400; opacity: 0.6; }

  .header-right {
    margin-left: auto; display: flex; align-items: center; gap: 12px;
  }

  .net-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px;
    color: var(--accent3); padding: 5px 10px;
    border: 1px solid rgba(67,217,173,0.2);
    border-radius: 20px; background: rgba(67,217,173,0.05);
    transition: all 0.3s;
  }

  .net-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 8px; font-family: var(--font);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.2s; text-decoration: none;
  }

  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 0 20px rgba(108,99,255,0.3);
  }
  .btn-primary:hover { background: #7b74ff; transform: translateY(-1px); box-shadow: 0 0 30px rgba(108,99,255,0.5); }

  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-lit); color: var(--text); background: var(--surface); }

  .btn-danger {
    background: rgba(255,101,132,0.15); color: var(--accent2);
    border: 1px solid rgba(255,101,132,0.3);
  }
  .btn-danger:hover { background: rgba(255,101,132,0.25); }

  /* ─── MAIN LAYOUT ─────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 32px 24px;
  }

  /* ─── AUTH SCREEN ─────────────────────────────────── */
  #auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 65px); text-align: center; gap: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 52px 48px;
    max-width: 440px; width: 100%;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }

  .auth-icon {
    width: 72px; height: 72px; margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }

  .auth-card h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
  .auth-card p { color: var(--text-dim); font-size: 14px; line-height: 1.7; margin-bottom: 28px; }

  /* ─── BREADCRUMB ──────────────────────────────────── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-dim);
    margin-bottom: 24px; flex-wrap: wrap;
  }

  .breadcrumb-item {
    cursor: pointer; padding: 3px 8px; border-radius: 6px;
    transition: all 0.15s;
  }
  .breadcrumb-item:hover { color: var(--text); background: var(--surface); }
  .breadcrumb-item.active { color: var(--text); font-weight: 600; cursor: default; }
  .breadcrumb-item.active:hover { background: transparent; }

  .breadcrumb-sep { color: var(--text-muted); }

  /* ─── TOOLBAR ─────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; flex-wrap: wrap;
  }

  .toolbar-left { display: flex; gap: 10px; flex: 1; flex-wrap: wrap; }
  .toolbar-right { display: flex; gap: 10px; }

  /* ─── GRID / FILE LIST ────────────────────────────── */
  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 16px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; overflow: hidden;
  }

  .file-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(108,99,255,0.05), transparent);
    opacity: 0; transition: opacity 0.2s;
  }

  .file-card:hover {
    border-color: var(--border-lit);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .file-card:hover::after { opacity: 1; }

  .file-icon {
    font-size: 36px; line-height: 1;
  }

  .file-name {
    font-size: 13px; font-weight: 600; word-break: break-word;
    color: var(--text); line-height: 1.4;
  }

  .file-meta {
    font-family: var(--mono); font-size: 10px;
    color: var(--text-muted);
  }

  .file-card.folder .file-icon { filter: drop-shadow(0 0 8px rgba(108,99,255,0.4)); }

  /* ─── EMPTY STATE ─────────────────────────────────── */
  .empty {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px 20px; color: var(--text-muted); gap: 12px;
    text-align: center;
  }
  .empty .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* ─── UPLOAD ZONE ─────────────────────────────────── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px; padding: 40px 24px;
    text-align: center; cursor: pointer;
    transition: all 0.25s; margin-bottom: 28px;
    position: relative; background: transparent;
  }

  .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.06);
    box-shadow: inset 0 0 40px rgba(108,99,255,0.05);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .upload-zone-icon { font-size: 40px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--text-dim); }

  /* ─── UPLOAD QUEUE ────────────────────────────────── */
  .upload-queue { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .upload-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: grid; gap: 8px;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .upload-item-top {
    display: flex; align-items: center; gap: 10px;
  }

  .upload-item-icon { font-size: 20px; }

  .upload-item-info { flex: 1; min-width: 0; }
  .upload-item-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .upload-item-size {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  }

  .upload-status {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 4px;
    white-space: nowrap;
  }
  .upload-status.uploading { color: var(--accent); background: rgba(108,99,255,0.1); }
  .upload-status.done { color: var(--accent3); background: rgba(67,217,173,0.1); }
  .upload-status.error { color: var(--accent2); background: rgba(255,101,132,0.1); }
  .upload-status.pending { color: var(--text-muted); background: var(--surface2); }

  /* ─── PROGRESS BAR ────────────────────────────────── */
  .progress-track {
    height: 3px; background: var(--surface2);
    border-radius: 2px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.2s ease;
    position: relative; overflow: hidden;
  }

  .progress-fill::after {
    content: ''; position: absolute; top: 0; right: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to { transform: translateX(200%); }
  }

  .upload-item-bottom {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  }

  /* ─── MODAL ───────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 400px;
    transform: scale(0.95); transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: var(--font); font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ─── TOAST ───────────────────────────────────────── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
  }

  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; max-width: 320px;
    display: flex; align-items: center; gap: 10px;
    animation: toastIn 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .toast.success { border-color: rgba(67,217,173,0.3); }
  .toast.error { border-color: rgba(255,101,132,0.3); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ─── LOADING ─────────────────────────────────────── */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 60px;
    color: var(--text-dim); font-size: 14px;
  }

  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SECTION LABEL ───────────────────────────────── */
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
  }

  .section-line { flex: 1; height: 1px; background: var(--border); }

  .count-badge {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); background: rgba(108,99,255,0.1);
    padding: 2px 7px; border-radius: 10px;
  }

  /* ─── USER PILL ───────────────────────────────────── */
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
  }

  .user-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }

  .user-name { font-size: 12px; font-weight: 600; }

  #app-screen { display: none; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Drive<span>Vault</span></div>
  <div class="net-badge" id="net-badge">
    <div class="dot"></div>
    <span id="net-speed">— Mbps</span>
  </div>
  <div class="header-right" id="header-right">
    <div class="user-pill hidden" id="user-pill">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">User</span>
    </div>
    <button class="btn btn-danger hidden" id="signout-btn" onclick="signOut()">Sign Out</button>
  </div>
</header>

<!-- AUTH SCREEN -->
<main id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <h2>DriveVault</h2>
    <p>Connect your Google account to securely manage and upload files directly to your designated Drive folder.</p>
    <button class="btn btn-primary" id="signin-btn" onclick="signIn()" style="width:100%;justify-content:center;font-size:15px;padding:13px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Sign in with Google
    </button>
  </div>
</main>

<!-- APP SCREEN -->
<main id="app-screen">
  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- Upload Zone -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple onchange="handleFileSelect(event)"/>
    <div class="upload-zone-icon">📁</div>
    <h3>Drop files here or click to upload</h3>
    <p>Upload any file type to the current folder</p>
  </div>

  <!-- Upload Queue -->
  <div id="upload-queue" class="upload-queue"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn btn-primary" onclick="openCreateFolder()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        New Folder
      </button>
      <button class="btn btn-ghost" onclick="loadFiles(currentFolderId)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Section header -->
  <div class="section-header">
    <span class="section-label">Contents</span>
    <div class="section-line"></div>
    <span class="count-badge" id="file-count">0 items</span>
  </div>

  <!-- File Grid -->
  <div id="file-list" class="file-grid">
    <div class="loading"><div class="spinner"></div><span>Loading files…</span></div>
  </div>
</main>

<!-- Create Folder Modal -->
<div class="modal-overlay" id="folder-modal">
  <div class="modal">
    <h3>📂 New Folder</h3>
    <div class="input-group">
      <label>Folder Name</label>
      <input type="text" id="folder-name-input" placeholder="Enter folder name…" onkeydown="if(event.key==='Enter')createFolder()"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const CLIENT_ID  = '879240149021-tkgkrq505ps17c0q400m5een4r7o7mfv.apps.googleusercontent.com';
const API_KEY    = 'AIzaSyDaj7PWa7M_lhBQoHA1X3RzZE6-2b3fdMs';
const ROOT_ID    = '1MJ7_PugrHBD3Ej3qug1R6cpQXIIGtd1X';
const SCOPES     = 'https://www.googleapis.com/auth/drive';
const DISC_DOC   = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

// ─── STATE ────────────────────────────────────────────────────────
let tokenClient, gapiInited = false, gisInited = false;
let currentFolderId = ROOT_ID;
let folderStack = [{ id: ROOT_ID, name: 'My Drive' }];
let uploadItems = {};

// ─── NETWORK SPEED ────────────────────────────────────────────────
async function measureSpeed() {
  try {
    const url = `https://www.googleapis.com/drive/v3/files?pageSize=1&key=${API_KEY}&_t=${Date.now()}`;
    const start = performance.now();
    const res = await fetch(url, { cache: 'no-store' });
    await res.json();
    const dur = performance.now() - start;
    const size = parseInt(res.headers.get('content-length') || '500');
    const mbps = ((size * 8) / (dur / 1000) / 1e6).toFixed(2);
    document.getElementById('net-speed').textContent = `${mbps} Mbps`;
  } catch {
    document.getElementById('net-speed').textContent = '— Mbps';
  }
}

setInterval(measureSpeed, 8000);
measureSpeed();

// ─── GAPI / GIS INIT ──────────────────────────────────────────────
function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISC_DOC] });
    gapiInited = true;
    maybeRestore();
  });
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: onTokenResponse,
  });
  gisInited = true;
  maybeRestore();
}

function maybeRestore() {
  if (!gapiInited || !gisInited) return;
  const saved = sessionGet();
  if (saved) {
    gapi.client.setToken(saved);
    showApp(saved);
  }
}

// ─── SESSION ──────────────────────────────────────────────────────
function sessionSet(token, user) {
  localStorage.setItem('dv_token', JSON.stringify(token));
  localStorage.setItem('dv_user', JSON.stringify(user));
}

function sessionGet() {
  const t = localStorage.getItem('dv_token');
  return t ? JSON.parse(t) : null;
}

function sessionClear() {
  localStorage.removeItem('dv_token');
  localStorage.removeItem('dv_user');
}

// ─── AUTH ─────────────────────────────────────────────────────────
function signIn() {
  document.getElementById('signin-btn').textContent = 'Connecting…';
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

async function onTokenResponse(resp) {
  if (resp.error) {
    toast('Sign-in failed: ' + resp.error, 'error');
    document.getElementById('signin-btn').textContent = 'Sign in with Google';
    return;
  }
  const token = gapi.client.getToken();
  let user = { name: 'User', initials: 'U' };
  try {
    const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + token.access_token }
    });
    const d = await info.json();
    user = { name: d.name || d.email || 'User', initials: (d.name || 'U')[0].toUpperCase() };
  } catch {}
  sessionSet(token, user);
  showApp(token, user);
}

function showApp(token, user) {
  const saved = JSON.parse(localStorage.getItem('dv_user') || '{}');
  const u = user || saved;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-pill').classList.remove('hidden');
  document.getElementById('signout-btn').classList.remove('hidden');
  document.getElementById('user-avatar').textContent = u.initials || 'U';
  document.getElementById('user-name').textContent = u.name || 'User';
  buildBreadcrumb();
  loadFiles(currentFolderId);
}

function signOut() {
  const token = gapi.client.getToken();
  if (token) google.accounts.oauth2.revoke(token.access_token);
  gapi.client.setToken('');
  sessionClear();
  currentFolderId = ROOT_ID;
  folderStack = [{ id: ROOT_ID, name: 'My Drive' }];
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('user-pill').classList.add('hidden');
  document.getElementById('signout-btn').classList.add('hidden');
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('upload-queue').innerHTML = '';
}

// ─── FILE LISTING ─────────────────────────────────────────────────
async function loadFiles(folderId) {
  document.getElementById('file-list').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Loading…</span></div>';

  try {
    const res = await gapi.client.drive.files.list({
      q: `'${folderId}' in parents and trashed=false`,
      fields: 'files(id,name,mimeType,size,modifiedTime,iconLink)',
      orderBy: 'folder,name',
      pageSize: 100,
    });
    renderFiles(res.result.files || []);
  } catch (e) {
    document.getElementById('file-list').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load files</p></div>';
    toast('Error loading files', 'error');
  }
}

function renderFiles(files) {
  const container = document.getElementById('file-list');
  document.getElementById('file-count').textContent = `${files.length} item${files.length !== 1 ? 's' : ''}`;

  if (!files.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>This folder is empty</p></div>';
    return;
  }

  container.innerHTML = files.map(f => {
    const isFolder = f.mimeType === 'application/vnd.google-apps.folder';
    const icon = isFolder ? '📁' : getIcon(f.mimeType, f.name);
    const size = f.size ? fmtBytes(f.size) : '';
    const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString() : '';
    return `
      <div class="file-card ${isFolder ? 'folder' : ''}" onclick="${isFolder ? `navigateIn('${f.id}','${esc(f.name)}')` : ''}">
        <div class="file-icon">${icon}</div>
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${[size, date].filter(Boolean).join(' · ')}</div>
      </div>`;
  }).join('');
}

// ─── NAVIGATION ───────────────────────────────────────────────────
function navigateIn(id, name) {
  folderStack.push({ id, name });
  currentFolderId = id;
  buildBreadcrumb();
  loadFiles(id);
}

function navigateTo(idx) {
  if (idx >= folderStack.length - 1) return;
  folderStack = folderStack.slice(0, idx + 1);
  currentFolderId = folderStack[folderStack.length - 1].id;
  buildBreadcrumb();
  loadFiles(currentFolderId);
}

function buildBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = folderStack.map((f, i) => {
    const isLast = i === folderStack.length - 1;
    return `
      ${i > 0 ? '<span class="breadcrumb-sep">›</span>' : ''}
      <span class="breadcrumb-item ${isLast ? 'active' : ''}" onclick="navigateTo(${i})">${esc(f.name)}</span>`;
  }).join('');
}

// ─── CREATE FOLDER ────────────────────────────────────────────────
function openCreateFolder() {
  document.getElementById('folder-modal').classList.add('open');
  setTimeout(() => document.getElementById('folder-name-input').focus(), 100);
}

function closeModal() {
  document.getElementById('folder-modal').classList.remove('open');
  document.getElementById('folder-name-input').value = '';
}

async function createFolder() {
  const name = document.getElementById('folder-name-input').value.trim();
  if (!name) return;
  closeModal();
  try {
    await gapi.client.drive.files.create({
      resource: { name, mimeType: 'application/vnd.google-apps.folder', parents: [currentFolderId] },
      fields: 'id',
    });
    toast(`Folder "${name}" created`, 'success');
    loadFiles(currentFolderId);
  } catch {
    toast('Failed to create folder', 'error');
  }
}

// ─── UPLOAD ───────────────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  [...e.dataTransfer.files].forEach(enqueue);
});

function handleFileSelect(e) { [...e.target.files].forEach(enqueue); e.target.value = ''; }

function enqueue(file) {
  const id = Date.now() + Math.random().toString(36).slice(2);
  uploadItems[id] = { file, progress: 0, status: 'pending', speed: 0, eta: '' };
  renderUploadItem(id);
  uploadFile(id);
}

function renderUploadItem(id) {
  const item = uploadItems[id];
  const el = document.createElement('div');
  el.className = 'upload-item'; el.id = `ui-${id}`;
  el.innerHTML = `
    <div class="upload-item-top">
      <div class="upload-item-icon">${getIcon('', item.file.name)}</div>
      <div class="upload-item-info">
        <div class="upload-item-name">${esc(item.file.name)}</div>
        <div class="upload-item-size">${fmtBytes(item.file.size)}</div>
      </div>
      <div class="upload-status pending" id="us-${id}">Pending</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pf-${id}" style="width:0%"></div></div>
    <div class="upload-item-bottom">
      <span id="uspd-${id}">— Mbps</span>
      <span id="ueta-${id}">—</span>
    </div>`;
  document.getElementById('upload-queue').prepend(el);
}

async function uploadFile(id) {
  const { file } = uploadItems[id];
  const token = gapi.client.getToken().access_token;
  setStatus(id, 'uploading', 'Uploading…');

  const metadata = JSON.stringify({ name: file.name, parents: [currentFolderId] });
  const form = new FormData();
  form.append('metadata', new Blob([metadata], { type: 'application/json' }));
  form.append('file', file);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name');
  xhr.setRequestHeader('Authorization', 'Bearer ' + token);

  let lastLoaded = 0, lastTime = Date.now();

  xhr.upload.onprogress = e => {
    if (!e.lengthComputable) return;
    const pct = (e.loaded / e.total * 100).toFixed(1);
    const now = Date.now();
    const dt = (now - lastTime) / 1000;
    const dl = e.loaded - lastLoaded;
    if (dt > 0.2) {
      const bps = dl / dt;
      const mbps = (bps * 8 / 1e6).toFixed(2);
      const remaining = (e.total - e.loaded) / bps;
      const eta = remaining < 60 ? `${Math.ceil(remaining)}s left` : `${Math.ceil(remaining/60)}m left`;
      document.getElementById(`uspd-${id}`).textContent = mbps + ' Mbps';
      document.getElementById(`ueta-${id}`).textContent = eta;
      // update global network badge
      document.getElementById('net-speed').textContent = mbps + ' Mbps';
      lastLoaded = e.loaded; lastTime = now;
    }
    document.getElementById(`pf-${id}`).style.width = pct + '%';
    setStatus(id, 'uploading', pct + '%');
  };

  xhr.onload = () => {
    if (xhr.status >= 200 && xhr.status < 300) {
      document.getElementById(`pf-${id}`).style.width = '100%';
      setStatus(id, 'done', '✓ Done');
      document.getElementById(`ueta-${id}`).textContent = 'Complete';
      toast(`"${file.name}" uploaded`, 'success');
      loadFiles(currentFolderId);
      setTimeout(() => { document.getElementById(`ui-${id}`)?.remove(); }, 5000);
    } else {
      setStatus(id, 'error', '✗ Failed');
      toast(`Upload failed: ${file.name}`, 'error');
    }
  };

  xhr.onerror = () => {
    setStatus(id, 'error', '✗ Error');
    toast(`Upload error: ${file.name}`, 'error');
  };

  xhr.send(form);
}

function setStatus(id, cls, text) {
  const el = document.getElementById(`us-${id}`);
  if (!el) return;
  el.className = 'upload-status ' + cls;
  el.textContent = text;
}

// ─── UTILS ────────────────────────────────────────────────────────
function getIcon(mime = '', name = '') {
  const ext = name.split('.').pop().toLowerCase();
  if (mime.includes('image') || ['jpg','jpeg','png','gif','webp','svg','ico'].includes(ext)) return '🖼️';
  if (mime.includes('video') || ['mp4','mov','avi','mkv','webm'].includes(ext)) return '🎬';
  if (mime.includes('audio') || ['mp3','wav','flac','aac','ogg'].includes(ext)) return '🎵';
  if (mime.includes('pdf') || ext === 'pdf') return '📄';
  if (['zip','rar','7z','tar','gz'].includes(ext)) return '📦';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📽️';
  if (['js','ts','py','php','html','css','json','xml','sh'].includes(ext)) return '💻';
  return '📋';
}

function fmtBytes(b) {
  if (!b) return '';
  b = parseInt(b);
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span>${icons[type] || ''}</span><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// Close modal on overlay click
document.getElementById('folder-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
