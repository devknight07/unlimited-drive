<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Drive Uploader - Upload files to Google Drive">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drive Uploader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #e8e8e8;
    --text2: #888888;
    --text3: #555555;
    --accent: #4ade80;
    --accent2: #22c55e;
    --accent-dim: rgba(74,222,128,0.1);
    --accent-dim2: rgba(74,222,128,0.05);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.1);
    --blue: #60a5fa;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
    --radius2: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; color: #000; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #speed-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    letter-spacing: 0.05em;
    display: none;
  }
  #speed-badge.active { display: block; color: var(--accent); border-color: var(--accent); }
  #user-info {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
  }
  #user-info.visible { display: flex; }
  #user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    object-fit: cover;
  }
  #user-name { font-size: 12px; font-weight: 500; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    padding: 40px 36px;
    text-align: center;
  }
  .auth-card h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .auth-card p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: var(--sans);
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    justify-content: center;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-outline:hover { background: var(--surface3); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  #main-app { display: none; flex: 1; flex-direction: column; }
  #main-app.visible { display: flex; }
  .app-toolbar {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .toolbar-right { display: flex; align-items: center; gap: 8px; }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
    flex-wrap: wrap;
  }
  .breadcrumb-item {
    cursor: pointer;
    color: var(--text2);
    transition: color 0.15s;
  }
  .breadcrumb-item:hover { color: var(--accent); }
  .breadcrumb-item.active { color: var(--text); cursor: default; }
  .breadcrumb-sep { color: var(--text3); }
  #drop-zone {
    margin: 20px 24px;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius2);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--accent-dim2);
    min-height: 120px;
  }
  #drop-zone:hover, #drop-zone.dragging {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  #drop-zone svg { width: 36px; height: 36px; color: var(--text3); transition: color 0.2s; }
  #drop-zone:hover svg, #drop-zone.dragging svg { color: var(--accent); }
  #drop-zone .dz-title { font-size: 14px; font-weight: 500; color: var(--text2); }
  #drop-zone .dz-sub { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  #drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #upload-queue { margin: 0 24px 12px; display: flex; flex-direction: column; gap: 8px; }
  .upload-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .upload-item-icon { flex-shrink: 0; }
  .upload-item-icon svg { width: 20px; height: 20px; color: var(--text3); }
  .upload-item-info { flex: 1; min-width: 0; }
  .upload-item-name {
    font-size: 13px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 5px;
  }
  .upload-item-meta {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .upload-status {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .upload-status.pending { color: var(--text3); }
  .upload-status.uploading { color: var(--yellow); }
  .upload-status.done { color: var(--accent); }
  .upload-status.error { color: var(--red); }
  #files-container { flex: 1; padding: 0 24px 24px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-top: 4px;
  }
  .section-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .file-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
  .file-card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .file-card-icon svg { width: 20px; height: 20px; }
  .icon-folder { background: rgba(251,191,36,0.12); }
  .icon-folder svg { color: var(--yellow); }
  .icon-image { background: rgba(96,165,250,0.12); }
  .icon-image svg { color: var(--blue); }
  .icon-doc { background: rgba(74,222,128,0.12); }
  .icon-doc svg { color: var(--accent); }
  .icon-generic { background: var(--surface3); }
  .icon-generic svg { color: var(--text3); }
  .file-card-name { font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; }
  .file-card-meta { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: auto; }
  .file-card-actions { position: absolute; top: 10px; right: 10px; display: none; gap: 4px; }
  .file-card:hover .file-card-actions { display: flex; }
  .icon-btn {
    width: 26px; height: 26px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface3);
  }
  .icon-btn:hover { background: var(--border2); }
  .icon-btn svg { width: 13px; height: 13px; color: var(--text2); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); grid-column: 1 / -1; }
  .empty-state svg { width: 40px; height: 40px; }
  .empty-state p { font-size: 13px; }
  .loader { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius2); width: 100%; max-width: 380px; padding: 28px; transform: translateY(12px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal label { display: block; font-size: 11px; font-family: var(--mono); color: var(--text2); letter-spacing: 0.08em; margin-bottom: 6px; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--text); outline: none; margin-bottom: 20px; font-family: var(--sans); transition: border-color 0.2s; }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
  .toast { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; animation: toastIn 0.25s ease; min-width: 240px; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--blue); }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .toast.success .toast-dot { background: var(--accent); }
  .toast.error .toast-dot { background: var(--red); }
  .toast.info .toast-dot { background: var(--blue); }
  #signout-btn { display: none; }
  #signout-btn.visible { display: flex; }
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .app-toolbar { padding: 12px 16px; }
    #drop-zone { margin: 16px; padding: 24px 16px; }
    #upload-queue { margin: 0 16px 12px; }
    #files-container { padding: 0 16px 16px; }
    #files-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      DRIVE·UP
    </div>
    <div class="header-right">
      <div id="speed-badge">▲ --</div>
      <div id="user-info">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
      <button class="btn btn-outline btn-sm" id="signout-btn" onclick="signOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </header>
  <div id="auth-screen">
    <div class="auth-card">
      <h1>Drive Uploader</h1>
      <p>A high-performance file management interface for Google Drive.</p>
      <button class="btn btn-primary" id="signin-btn" onclick="initAndSignIn()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Connect with Google
      </button>
    </div>
  </div>
  <div id="main-app">
    <div class="app-toolbar">
      <div class="toolbar-left">
        <div class="breadcrumb" id="breadcrumb"><span class="breadcrumb-item active">Root</span></div>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-outline btn-sm" onclick="openNewFolderModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          New Folder
        </button>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('file-input').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Files
        </button>
      </div>
    </div>
    <div id="drop-zone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div class="dz-title">Drop files here to upload</div>
      <div class="dz-sub">or click to browse · any file type</div>
      <input type="file" id="file-input" multiple onchange="handleFileSelect(event)">
    </div>
    <div id="upload-queue"></div>
    <div id="files-container">
      <div class="section-header">
        <span class="section-title" id="files-label">Files & Folders</span>
        <div class="loader" id="files-loader" style="display:none"></div>
      </div>
      <div id="files-grid"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="folder-modal">
  <div class="modal">
    <h3>Create New Folder</h3>
    <label>FOLDER NAME</label>
    <input type="text" id="folder-name-input" placeholder="My Folder" onkeydown="if(event.key==='Enter')createFolder()">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createFolder()">Create</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
const CLIENT_ID   = '155197234126-k0por50dvrg1k2p5b3r6722jdhpst06e.apps.googleusercontent.com';
const API_KEY     = 'AIzaSyB51qBN36v8ffCaXHXOW1VI4Kd1UlfjZJQ';
const ROOT_FOLDER = '1MJ7_PugrHBD3Ej3qug1R6cpQXIIGtd1X';
const SCOPES        = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';
const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
let state = { currentFolderId: ROOT_FOLDER, folderStack: [], files: [], uploadQueue: [], isSignedIn: false, tokenClient: null };
let _gapiResolve, _gisResolve;
const gapiReady = new Promise(r => _gapiResolve = r);
const gisReady  = new Promise(r => _gisResolve  = r);
function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); _gapiResolve(); const s = getSavedSession(); if(s && s.accessToken){ gapi.client.setToken({ access_token: s.accessToken }); tryAutoRestore(s); } }); }
function gisLoaded() { state.tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: handleTokenResponse }); _gisResolve(); }
function getSavedSession() { try { return JSON.parse(localStorage.getItem('driveup_session')); } catch { return null; } }
async function tryAutoRestore(s) { try { const res = await gapi.client.drive.about.get({ fields: 'user' }); const u = res.result.user; state.isSignedIn = true; updateUserUI(u.displayName, u.photoLink); showMainApp(); loadFiles(); } catch { localStorage.removeItem('driveup_session'); } }
async function initAndSignIn() { const b = document.getElementById('signin-btn'); b.disabled = true; b.textContent = 'Connecting…'; try { await Promise.all([gapiReady, gisReady]); state.tokenClient.requestAccessToken({ prompt: '' }); } catch (err) { showToast('Error: ' + (err.message || err), 'error'); b.disabled = false; b.textContent = 'Connect with Google'; } }
async function handleTokenResponse(resp) { if (resp.error) { showToast('Auth failed: ' + resp.error, 'error'); document.getElementById('signin-btn').disabled = false; return; } try { const token = gapi.client.getToken(); const res = await gapi.client.drive.about.get({ fields: 'user' }); const u = res.result.user; localStorage.setItem('driveup_session', JSON.stringify({ accessToken: token.access_token, userName: u.displayName, userAvatar: u.photoLink })); state.isSignedIn = true; updateUserUI(u.displayName, u.photoLink); showMainApp(); loadFiles(); } catch (err) { showToast('Sign-in error: ' + err.message, 'error'); } }
function signOut() { try { const t = gapi.client.getToken(); if (t) { google.accounts.oauth2.revoke(t.access_token); gapi.client.setToken(''); } } catch {} localStorage.removeItem('driveup_session'); state.isSignedIn = false; state.files = []; state.uploadQueue = []; state.folderStack = []; state.currentFolderId = ROOT_FOLDER; document.getElementById('main-app').classList.remove('visible'); document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('user-info').classList.remove('visible'); document.getElementById('signout-btn').classList.remove('visible'); showToast('Signed out', 'info'); }
function updateUserUI(n, a) { document.getElementById('user-name').textContent = n; document.getElementById('user-avatar').src = a || ''; document.getElementById('user-info').classList.add('visible'); document.getElementById('signout-btn').classList.add('visible'); }
function showMainApp() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-app').classList.add('visible'); updateBreadcrumb(); }
function updateBreadcrumb() { const bc = document.getElementById('breadcrumb'); let html = `<span class="breadcrumb-item" onclick="navigateToRoot()">Root</span>`; state.folderStack.forEach((f, i) => { html += `<span class="breadcrumb-sep">/</span>`; if (i < state.folderStack.length - 1) html += `<span class="breadcrumb-item" onclick="navigateToIndex(${i})">${esc(f.name)}</span>`; else html += `<span class="breadcrumb-item active">${esc(f.name)}</span>`; }); bc.innerHTML = html; }
function navigateToRoot() { state.currentFolderId = ROOT_FOLDER; state.folderStack = []; updateBreadcrumb(); loadFiles(); }
function navigateToIndex(idx) { state.folderStack = state.folderStack.slice(0, idx + 1); state.currentFolderId = state.folderStack[idx].id; updateBreadcrumb(); loadFiles(); }
function navigateToFolder(id, n) { state.folderStack.push({ id, name: n }); state.currentFolderId = id; updateBreadcrumb(); loadFiles(); }
async function loadFiles() { const grid = document.getElementById('files-grid'); const loader = document.getElementById('files-loader'); loader.style.display = 'block'; grid.innerHTML = ''; try { const res = await gapi.client.drive.files.list({ q: `'${state.currentFolderId}' in parents and trashed = false`, fields: 'files(id,name,mimeType,size,modifiedTime)', orderBy: 'folder,name', pageSize: 200 }); state.files = res.result.files || []; loader.style.display = 'none'; document.getElementById('files-label').textContent = `${state.files.length} item${state.files.length !== 1 ? 's' : ''}`; if (state.files.length === 0) { grid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><p>This folder is empty</p></div>`; return; } state.files.forEach(f => grid.appendChild(buildFileCard(f))); } catch (err) { loader.style.display = 'none'; showToast('Error loading files', 'error'); } }
function buildFileCard(f) { const isF = f.mimeType === 'application/vnd.google-apps.folder'; const icon = getFileIcon(f.mimeType); const size = f.size ? formatSize(+f.size) : '—'; const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString() : ''; const card = document.createElement('div'); card.className = 'file-card'; card.innerHTML = `<div class="file-card-icon ${icon.cls}">${icon.svg}</div><div class="file-card-name" title="${esc(f.name)}">${esc(f.name)}</div><div class="file-card-meta">${size} · ${date}</div><div class="file-card-actions">${!isF ? `<button class="icon-btn" onclick="event.stopPropagation();downloadFile('${f.id}','${esc(f.name)}')" title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>` : ''}</div>`; if (isF) card.addEventListener('click', () => navigateToFolder(f.id, f.name)); return card; }
function getFileIcon(m) { if (m === 'application/vnd.google-apps.folder') return { cls:'icon-folder', svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>` }; if (m.startsWith('image/')) return { cls:'icon-image', svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>` }; if (m.includes('document') || m.includes('text') || m.includes('pdf')) return { cls:'icon-doc', svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>` }; return { cls:'icon-generic', svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>` }; }
async function downloadFile(id, n) { try { const token = gapi.client.getToken(); const url = `https://www.googleapis.com/drive/v3/files/${id}?alt=media`; const res = await fetch(url, { headers: { Authorization: `Bearer ${token.access_token}` } }); const blob = await res.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = n; a.click(); } catch { showToast('Download failed', 'error'); } }
function openNewFolderModal() { document.getElementById('folder-name-input').value = ''; document.getElementById('folder-modal').classList.add('open'); setTimeout(() => document.getElementById('folder-name-input').focus(), 180); }
function closeModal() { document.getElementById('folder-modal').classList.remove('open'); }
async function createFolder() { const n = document.getElementById('folder-name-input').value.trim(); if (!n) return; closeModal(); try { await gapi.client.drive.files.create({ resource: { name: n, mimeType: 'application/vnd.google-apps.folder', parents: [state.currentFolderId] } }); showToast(`Folder created`, 'success'); loadFiles(); } catch { showToast('Failed to create folder', 'error'); } }
function handleDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragging'); }
function handleDragLeave() { document.getElementById('drop-zone').classList.remove('dragging'); }
function handleDrop(e) { e.preventDefault(); document.getElementById('drop-zone').classList.remove('dragging'); queueFiles([...e.dataTransfer.files]); }
function handleFileSelect(e) { queueFiles([...e.target.files]); e.target.value = ''; }
function queueFiles(files) { files.forEach(f => { const item = { file: f, uid: Date.now() + Math.random(), status: 'pending' }; state.uploadQueue.push(item); renderUploadItem(item); }); processQueue(); }
function renderUploadItem(item) { const div = document.createElement('div'); div.className = 'upload-item'; div.id = `uitem-${item.uid}`; div.innerHTML = `<div class="upload-item-icon">${getFileIcon(item.file.type || '').svg}</div><div class="upload-item-info"><div class="upload-item-name">${esc(item.file.name)}</div><div class="upload-item-meta"><span>${formatSize(item.file.size)}</span><span id="upct-${item.uid}"></span></div><div class="progress-bar"><div class="progress-fill" id="uprog-${item.uid}"></div></div></div><div class="upload-status pending" id="ustatus-${item.uid}">PENDING</div>`; document.getElementById('upload-queue').prepend(div); }
let activeU = 0;
function processQueue() { state.uploadQueue.filter(i => i.status === 'pending').forEach(item => { if (activeU >= 2) return; activeU++; item.status = 'uploading'; uploadFile(item).finally(() => { activeU--; processQueue(); }); }); }
async function uploadFile(item) { const el = document.getElementById(`ustatus-${item.uid}`); el.className = `upload-status uploading`; el.textContent = 'UPLOADING'; try { const token = gapi.client.getToken(); const meta = { name: item.file.name, parents: [state.currentFolderId] }; const form = new FormData(); form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' })); form.append('file', item.file); await new Promise((resolve, reject) => { const xhr = new XMLHttpRequest(); xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart'); xhr.setRequestHeader('Authorization', 'Bearer ' + token.access_token); xhr.upload.onprogress = e => { const pct = Math.round(e.loaded/e.total*100); document.getElementById(`uprog-${item.uid}`).style.width = pct+'%'; document.getElementById(`upct-${item.uid}`).textContent = pct+'%'; }; xhr.onload = () => resolve(); xhr.onerror = () => reject(); xhr.send(form); }); el.className = `upload-status done`; el.textContent = 'DONE'; loadFiles(); setTimeout(() => document.getElementById(`uitem-${item.uid}`).remove(), 2000); } catch { el.className = `upload-status error`; el.textContent = 'ERROR'; } }
function formatSize(b) { if (!b) return '0 B'; const u = ['B','KB','MB','GB'], i = Math.floor(Math.log(b) / Math.log(1024)); return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i]; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type = 'info') { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<div class="toast-dot"></div><span>${esc(msg)}</span>`; c.appendChild(t); setTimeout(() => t.remove(), 4000); }
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
